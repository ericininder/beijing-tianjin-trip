<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>價錢換算｜北京 × 天津 8日自由行</title>
<style>
:root{--sky:#dff6ff;--sky2:#f8fcff;--navy:#0b3766;--navy2:#082a50;--blue:#1e6799;--cream:#fff7e8;--line:#bde9f7;--orange:#f3a044;--card:#fff;--muted:#6c7c8d;--shadow:0 14px 40px rgba(9,50,93,.14);--radius:22px;}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--navy2);background:linear-gradient(180deg,var(--sky),#f7fcff 42%,#fff)}a{color:inherit}.app{max-width:980px;margin:0 auto;padding:18px 16px 72px}.hero{position:relative;overflow:hidden;border-radius:30px;padding:26px 20px 22px;background:radial-gradient(circle at 10% 12%,#fff 0 7%,transparent 23%),linear-gradient(135deg,#bdefff,#f7fbff 70%);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.85)}.hero:before{content:"";position:absolute;inset:0;background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160"><path d="M16 60 C70 10 112 120 178 56 C222 14 258 32 306 14" fill="none" stroke="rgba(11,55,102,.18)" stroke-width="3" stroke-dasharray="8 10"/><text x="268" y="28" font-size="24">✈</text><text x="28" y="132" font-size="22">✦</text><text x="218" y="126" font-size="18">✦</text></svg>') center/cover no-repeat;opacity:.75}.hero>*{position:relative}.eyebrow{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.72);color:var(--blue);font-weight:900;letter-spacing:.08em}h1{margin:14px 0 6px;font-size:clamp(2rem,6vw,4.2rem);line-height:1.05;letter-spacing:.03em;color:var(--navy);text-shadow:0 2px 0 rgba(255,255,255,.65)}.hero p{margin:0;color:#31516c;line-height:1.7;font-weight:700}.top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;padding:12px 16px;border-radius:999px;text-decoration:none;border:1px solid rgba(10,55,101,.12);background:#fff;color:var(--navy);font-weight:950;box-shadow:0 8px 20px rgba(12,60,110,.10);cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--navy),#17669a);color:#fff;border-color:transparent}.btn.soft{background:#eefaff}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-top:18px}.card{background:rgba(255,255,255,.9);border:1px solid rgba(190,232,247,.9);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-head{padding:20px 22px;background:linear-gradient(135deg,#fff,#eaf9ff);border-bottom:1px solid var(--line)}.card-body{padding:20px 22px}h2{margin:0;color:var(--navy);font-size:1.55rem}.hint{margin:8px 0 0;color:#4f6478;line-height:1.7;font-weight:700}.field{display:grid;gap:8px;margin:14px 0}label{font-weight:1000;color:var(--navy)}input,select{width:100%;min-height:48px;border-radius:16px;border:1px solid var(--line);background:#fff;padding:12px 14px;font-size:1rem;color:var(--navy2);font-weight:800;outline:none}input:focus,select:focus{border-color:#78c7e6;box-shadow:0 0 0 4px rgba(120,199,230,.25)}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.result{margin-top:16px;padding:18px;border-radius:20px;background:linear-gradient(135deg,var(--navy),#0a477b);color:#fff}.result small{display:block;color:#cceeff;font-weight:900;margin-bottom:4px}.result strong{font-size:clamp(2rem,8vw,3.5rem);line-height:1}.sub{margin-top:6px;color:#ffe1a7;font-weight:850}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{border:0;border-radius:999px;background:#eefaff;color:var(--navy);font-weight:1000;padding:10px 12px;cursor:pointer;border:1px solid var(--line)}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:left;color:#567083;font-size:.9rem}.table td,.table th{padding:8px 10px}.table tbody tr{background:#f1fbff}.table tbody td:first-child{border-radius:12px 0 0 12px;font-weight:950;color:var(--navy)}.table tbody td:last-child{border-radius:0 12px 12px 0;text-align:right;font-weight:950}.mini{display:grid;gap:12px}.note{display:flex;gap:10px;padding:12px 14px;background:#fff7e8;border:1px solid rgba(243,160,68,.25);border-radius:16px;color:#244963;font-weight:850;line-height:1.6}.footer{margin-top:18px;text-align:center;color:#45677c;line-height:1.7;font-weight:650}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:.25s;background:rgba(8,42,80,.96);color:#fff;padding:12px 16px;border-radius:999px;z-index:100;box-shadow:0 14px 30px rgba(0,0,0,.18);font-weight:900}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:780px){.app{padding:12px 12px 72px}.hero{border-radius:24px;padding:22px 16px}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.btn{flex:1 1 150px}.card-body,.card-head{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<div class="app">
<header class="hero">
  <div class="eyebrow">TRIP TOOL｜價錢換算</div>
  <h1>人民幣 ↔ 台幣換算</h1>
  <p>可自行修改匯率，適合在餐廳、商店、門票或交通付款前快速估算。此頁不連網抓即時匯率，請依實際刷卡或換匯匯率調整。</p>
  <div class="top-actions">
    <a class="btn primary" href="./index.html">← 回行程首頁</a>
    <a class="btn soft" href="./todo.html">✅ To-Do List</a>
  </div>
</header>

<main class="grid">
  <section class="card">
    <div class="card-head"><h2>快速換算</h2><p class="hint">預設匯率可改；修改後會存在這台手機 / 電腦的瀏覽器。</p></div>
    <div class="card-body">
      <div class="row">
        <div class="field"><label for="amount">金額</label><input id="amount" inputmode="decimal" type="number" min="0" step="0.01" value="100"></div>
        <div class="field"><label for="mode">換算方向</label><select id="mode"><option value="cny-twd">人民幣 CNY → 台幣 TWD</option><option value="twd-cny">台幣 TWD → 人民幣 CNY</option></select></div>
      </div>
      <div class="row">
        <div class="field"><label for="rate">匯率設定：1 CNY ≈ 幾 TWD</label><input id="rate" inputmode="decimal" type="number" min="0" step="0.001" value="4.50"></div>
        <div class="field"><label for="rounding">四捨五入</label><select id="rounding"><option value="1">整數</option><option value="0.1">小數 1 位</option><option value="0.01">小數 2 位</option></select></div>
      </div>
      <div class="result" aria-live="polite"><small>換算結果</small><strong id="resultText">NT$450</strong><div class="sub" id="formulaText">¥100 × 4.50</div></div>
      <div class="chips" id="chips"></div>
      <div class="top-actions"><button class="btn" type="button" onclick="copyResult()">📋 複製結果</button><button class="btn soft" type="button" onclick="resetRate()">↺ 重設匯率</button></div>
    </div>
  </section>

  <aside class="mini">
    <section class="card">
      <div class="card-head"><h2>常用人民幣表</h2><p class="hint">以目前匯率自動更新。</p></div>
      <div class="card-body"><table class="table"><thead><tr><th>人民幣</th><th>約台幣</th></tr></thead><tbody id="quickTable"></tbody></table></div>
    </section>
    <section class="card">
      <div class="card-head"><h2>分帳小工具</h2><p class="hint">輸入總價與人數，快速估每人金額。</p></div>
      <div class="card-body">
        <div class="field"><label for="bill">總價 CNY</label><input id="bill" inputmode="decimal" type="number" min="0" step="0.01" value="300"></div>
        <div class="field"><label for="people">人數</label><input id="people" inputmode="numeric" type="number" min="1" step="1" value="3"></div>
        <div class="note"><span>🧮</span><span id="splitText">每人約 ¥100 / NT$450</span></div>
      </div>
    </section>
  </aside>
</main>
<footer class="footer">小提醒：旅途中實際扣款可能包含刷卡海外手續費或平台匯率差，請以銀行 / 支付工具顯示為準。</footer>
</div>
<div class="toast" id="toast">已複製</div>
<script>
const DEFAULT_RATE = 4.50;
const amounts = [5,10,20,50,100,200,500,1000];
const qs = id => document.getElementById(id);
function num(v){ const n = Number(v); return Number.isFinite(n) ? n : 0; }
function fmt(n, currency){
  const step = Number(qs('rounding').value);
  const rounded = Math.round(n / step) * step;
  const digits = step === 1 ? 0 : step === 0.1 ? 1 : 2;
  return (currency === 'TWD' ? 'NT$' : '¥') + rounded.toLocaleString('zh-TW',{minimumFractionDigits:digits, maximumFractionDigits:digits});
}
function save(){ localStorage.setItem('bt_rate_cny_twd', String(num(qs('rate').value) || DEFAULT_RATE)); }
function load(){ const r = Number(localStorage.getItem('bt_rate_cny_twd')); if(Number.isFinite(r) && r>0) qs('rate').value = r; }
function renderChips(){ qs('chips').innerHTML = amounts.map(a => `<button class="chip" type="button" onclick="setCNY(${a})">¥${a}</button>`).join(''); }
function setCNY(a){ qs('mode').value='cny-twd'; qs('amount').value=a; calc(); window.scrollTo({top:0,behavior:'smooth'}); }
function calc(){
  const amount = num(qs('amount').value), rate = num(qs('rate').value) || DEFAULT_RATE, mode = qs('mode').value;
  save();
  let out, formula;
  if(mode === 'cny-twd') { out = amount * rate; qs('resultText').textContent = fmt(out,'TWD'); formula = `¥${amount.toLocaleString('zh-TW')} × ${rate}`; }
  else { out = rate ? amount / rate : 0; qs('resultText').textContent = fmt(out,'CNY'); formula = `NT$${amount.toLocaleString('zh-TW')} ÷ ${rate}`; }
  qs('formulaText').textContent = formula;
  renderTable(); renderSplit();
}
function renderTable(){ const rate = num(qs('rate').value) || DEFAULT_RATE; qs('quickTable').innerHTML = amounts.map(a => `<tr><td>¥${a}</td><td>${fmt(a*rate,'TWD')}</td></tr>`).join(''); }
function renderSplit(){ const bill=num(qs('bill').value), people=Math.max(1,Math.floor(num(qs('people').value)||1)), rate=num(qs('rate').value)||DEFAULT_RATE; const cny=bill/people; qs('splitText').textContent = `每人約 ${fmt(cny,'CNY')} / ${fmt(cny*rate,'TWD')}`; }
function resetRate(){ qs('rate').value = DEFAULT_RATE; calc(); toast('已重設為預設匯率'); }
async function copyResult(){ const text = `${qs('resultText').textContent}（${qs('formulaText').textContent}，匯率 1 CNY≈${qs('rate').value} TWD）`; try{ await navigator.clipboard.writeText(text); toast('已複製換算結果'); }catch(e){ toast('目前瀏覽器不支援複製'); } }
function toast(text){ const t=qs('toast'); t.textContent=text; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
['amount','mode','rate','rounding','bill','people'].forEach(id => qs(id).addEventListener('input', calc));
load(); renderChips(); calc();
</script>
</body>
</html>
