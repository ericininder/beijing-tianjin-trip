<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>北京 × 天津 8日自由行｜私人電子行程表</title>
<style>
:root {
  --sky:#dff6ff; --sky2:#f8fcff; --navy:#0b3766; --navy2:#082a50; --blue:#1e6799;
  --cream:#fff7e8; --line:#bde9f7; --orange:#f3a044; --card:#ffffff; --muted:#6c7c8d;
  --shadow:0 14px 40px rgba(9,50,93,.14); --radius:22px;
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; color:var(--navy2); background:linear-gradient(180deg,var(--sky),#f7fcff 42%,#ffffff); }
a { color:inherit; }
.app { max-width:1100px; margin:0 auto; padding:18px 16px 78px; }
.hero { position:relative; overflow:hidden; border-radius:30px; padding:28px 20px 22px; background: radial-gradient(circle at 10% 10%, #fff 0 6%, transparent 22%), linear-gradient(135deg,#bdefff,#f7fbff 70%); box-shadow:var(--shadow); border:1px solid rgba(255,255,255,.85); }
.hero::before { content:""; position:absolute; inset:0; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160"><path d="M16 60 C70 10 112 120 178 56 C222 14 258 32 306 14" fill="none" stroke="rgba(11,55,102,.18)" stroke-width="3" stroke-dasharray="8 10"/><text x="268" y="28" font-size="24">✈</text><text x="28" y="132" font-size="22">✦</text><text x="218" y="126" font-size="18">✦</text></svg>') center/cover no-repeat; opacity:.75; }
.hero > * { position:relative; }
.eyebrow { display:inline-flex; gap:8px; align-items:center; padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.72); color:var(--blue); font-weight:800; letter-spacing:.08em; }
h1 { margin:14px 0 6px; font-size:clamp(2rem, 6vw, 4.5rem); line-height:1.05; letter-spacing:.04em; color:var(--navy); text-shadow:0 2px 0 rgba(255,255,255,.65); }
.hero p { margin:0; font-size:1rem; color:#31516c; line-height:1.7; }
.top-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:46px; padding:12px 16px; border-radius:999px; text-decoration:none; border:1px solid rgba(10,55,101,.12); background:#fff; color:var(--navy); font-weight:900; box-shadow:0 8px 20px rgba(12,60,110,.10); cursor:pointer; }
.btn.primary { background:linear-gradient(135deg,var(--navy),#17669a); color:white; border-color:transparent; }
.btn.soft { background:#eefaff; }
.quick-tools { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; margin:14px 0 6px; }
.tool-card { display:grid; grid-template-columns:auto 1fr; gap:10px 12px; align-items:center; padding:16px; border-radius:22px; text-decoration:none; background:rgba(255,255,255,.88); border:1px solid rgba(190,232,247,.9); box-shadow:0 10px 24px rgba(12,60,110,.10); color:var(--navy); }
.tool-card span { grid-row:1 / span 2; display:grid; place-items:center; width:46px; height:46px; border-radius:16px; background:#eefaff; font-size:1.45rem; }
.tool-card strong { font-size:1.12rem; font-weight:1000; }
.tool-card em { font-style:normal; color:#4f6478; font-weight:750; line-height:1.45; }
.day-nav-wrap { position:sticky; top:0; z-index:50; padding:12px 0 10px; margin:8px -16px 14px; background:linear-gradient(180deg,rgba(230,248,255,.98),rgba(247,252,255,.90)); backdrop-filter: blur(14px); border-bottom:1px solid rgba(11,55,102,.06); }
.day-nav { display:flex; gap:8px; overflow:auto; padding:0 16px; scrollbar-width:none; }
.day-nav::-webkit-scrollbar { display:none; }
.day-tab { flex:0 0 auto; border:0; padding:10px 14px; border-radius:999px; background:#fff; color:var(--navy); font-weight:950; box-shadow:0 5px 16px rgba(10,55,101,.09); cursor:pointer; }
.day-tab.active { background:var(--navy); color:#fff; }
.day-panel { display:grid; grid-template-columns: minmax(0,1.05fr) minmax(330px,.75fr); gap:20px; align-items:start; }
.info-card, .poster-card { background:rgba(255,255,255,.88); border:1px solid rgba(190,232,247,.9); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.info-head { padding:22px; background:linear-gradient(135deg,#ffffff,#eaf9ff); border-bottom:1px solid var(--line); }
.day-kicker { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.day-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; background:var(--cream); border:2px solid rgba(11,55,102,.15); border-radius:14px; font-weight:1000; color:var(--navy); letter-spacing:.04em; font-size:1.15rem; }
.date-route { font-weight:900; color:#234c73; }
h2 { margin:14px 0 8px; font-size:clamp(1.45rem,4.5vw,2.35rem); color:var(--navy); }
.summary { margin:0; color:#4f6478; line-height:1.75; font-weight:650; }
.actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
.section { padding:18px 22px; border-top:1px solid rgba(189,233,247,.65); }
.section:first-of-type { border-top:0; }
.section-title { display:flex; align-items:center; gap:10px; margin:0 0 12px; color:var(--navy); font-size:1.18rem; font-weight:1000; }
.timeline { display:grid; gap:12px; }
.slot { display:grid; grid-template-columns:96px 1fr; gap:12px; align-items:stretch; background:linear-gradient(135deg,var(--navy),#0a477b); color:white; border-radius:18px; padding:12px; box-shadow:0 8px 20px rgba(11,55,102,.12); }
.slot-label { background:var(--cream); color:var(--navy); border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; min-height:76px; font-weight:1000; }
.slot-label .icon { font-size:1.45rem; }
.slot ul { margin:0; padding-left:1.1rem; line-height:1.72; font-weight:760; }
.slot li:first-child { color:#ffe1a7; font-size:1.05rem; font-weight:1000; }
.tip-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
.tip { background:linear-gradient(180deg,#fff7e8,#fffdf8); border:1px solid rgba(11,55,102,.08); border-radius:18px; padding:14px; min-height:145px; }
.tip strong { display:flex; align-items:center; gap:8px; color:var(--navy); font-size:1.18rem; margin-bottom:8px; }
.tip p { margin:4px 0; color:#244963; line-height:1.55; font-weight:700; }
.links-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; }
.map-link { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; border-radius:16px; text-decoration:none; background:#eefaff; border:1px solid var(--line); font-weight:950; color:var(--navy); }
.map-link span:last-child { color:#2d85bd; font-size:.95rem; }
.note { display:flex; gap:10px; align-items:flex-start; padding:12px 14px; background:#eaf8ff; border:1px solid var(--line); border-radius:16px; color:#244963; font-weight:850; line-height:1.6; }
.poster-card { position:sticky; top:92px; padding:12px; }
.poster-card img { display:block; width:100%; height:auto; border-radius:18px; box-shadow:0 8px 24px rgba(8,42,80,.13); }
.poster-title { display:flex; justify-content:space-between; align-items:center; gap:8px; margin:2px 4px 12px; font-weight:1000; color:var(--navy); }
.mobile-poster { display:none; }
.footer { margin-top:20px; padding:18px; color:#45677c; line-height:1.7; text-align:center; font-weight:650; }
.toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none; transition:.25s; background:rgba(8,42,80,.96); color:#fff; padding:12px 16px; border-radius:999px; z-index:100; box-shadow:0 14px 30px rgba(0,0,0,.18); font-weight:900; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@media (max-width: 860px) {
  .app { padding:12px 12px 84px; }
  .hero { border-radius:24px; padding:22px 16px; }
  .day-nav-wrap { margin-left:-12px; margin-right:-12px; }
  .day-panel { display:block; }
  .poster-card { display:none; }
  .mobile-poster { display:block; margin-top:14px; }
  .tip-grid { grid-template-columns: repeat(2, 1fr); }
  .links-grid { grid-template-columns: 1fr; }
  .slot { grid-template-columns:82px 1fr; padding:10px; }
  .slot ul { padding-left:1rem; }
  .section, .info-head { padding-left:16px; padding-right:16px; }
}
@media (max-width: 460px) {
  .quick-tools { grid-template-columns:1fr; }
  .tip-grid { grid-template-columns:1fr; }
  .slot { grid-template-columns:76px 1fr; }
  .slot-label { min-height:70px; }
  .btn { width:100%; }
  .top-actions .btn { width:auto; flex:1 1 150px; }
}
@media print { .day-nav-wrap, .top-actions, .actions, .poster-card { display:none !important; } .app { max-width:none; } .day-panel { display:block; } }
</style>
</head>

h/?api=1&query=%E5%89%8D%E9%96%80%E5%A4%A7%E8%A1%97"}, {"name": "大柵欄", "url": "https://www.google.com/maps/search/?api=1&query=%E5%A4%A7%E6%9F%B5%E6%AC%84"}], "note": "最後一天建議以輕鬆行程為主，方便整理行李與返程。"}];
const POSTERS = {"1": "assets/day1.webp", "2": "assets/day2.webp", "3": "assets/day3.webp", "4": "assets/day4.webp", "5": "assets/day5.webp", "6": "assets/day6.webp", "7": "assets/day7.webp", "8": "assets/day8.webp"};
const ICONS = {"食":"🍽️", "衣":"🧥", "住":"🏨", "行":"🚇"};
let current = 1;
const ESC_MAP = {"&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;"};
function esc(s) { return String(s).replace(/[&<>\"']/g, c => ESC_MAP[c]); }
function showToast(text) { const t=document.getElementById('toast'); t.textContent=text; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function dayText(day) {
  return `北京 × 天津 8日自由行
DAY ${day.day}｜${day.date} ${day.place}
${day.theme}

` +
    day.schedule.map(s => `${s.period}：` + s.items.join(' / ')).join('\\n') +
    `

住宿：${day.hotel}
小提醒：${day.note}`;
}
async function copyDay() {
  const day = DAYS.find(d=>d.day===current);
  try { await navigator.clipboard.writeText(dayText(day)); showToast('已複製本日行程'); }
  catch(e) { showToast('目前瀏覽器不支援複製'); }
}
async function shareTrip() {
  const day = DAYS.find(d=>d.day===current) || DAYS[0];
  const text = dayText(day);
  if (navigator.share) { try { await navigator.share({title:'北京 × 天津 8日自由行', text}); } catch(e) {} }
  else { try { await navigator.clipboard.writeText(text); showToast('已複製，可貼給同行者'); } catch(e) { showToast('目前瀏覽器不支援分享'); } }
}
function renderNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = DAYS.map(d => `<button class="day-tab ${d.day===current?'active':''}" type="button" onclick="selectDay(${d.day})">DAY ${d.day}<br><small>${esc(d.date)}</small></button>`).join('');
}
function renderDay() {
  const day = DAYS.find(d=>d.day===current);
  const schedules = day.schedule.map(s => `<article class="slot"><div class="slot-label"><span class="icon">${s.icon}</span><span>${esc(s.period)}</span></div><ul>${s.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></article>`).join('');
  const tips = Object.entries(day.tips).map(([k, arr]) => `<article class="tip"><strong><span>${ICONS[k]||'•'}</span>${esc(k)}</strong>${arr.map(x=>`<p>${esc(x)}</p>`).join('')}</article>`).join('');
  const links = day.links.map(l => `<a class="map-link" href="${esc(l.url)}" target="_blank" rel="noopener"><span>📍 ${esc(l.name)}</span><span>開啟地圖 ↗</span></a>`).join('');
  const poster = `<img src="${POSTERS[day.day]}" alt="DAY ${day.day} 行程圖">`;
  document.getElementById('day-root').innerHTML = `
    <section class="info-card">
      <div class="info-head">
        <div class="day-kicker"><span class="day-badge">DAY ${day.day}</span><span class="date-route">${esc(day.date)}｜${esc(day.place)}</span></div>
        <h2>${esc(day.theme)}</h2>
        <p class="summary">${esc(day.summary)}</p>
        <div class="actions">
          <a class="btn primary" href="${esc(day.route)}" target="_blank" rel="noopener">🗺️ 開啟本日路線</a>
          <button class="btn" type="button" onclick="copyDay()">📋 複製本日行程</button>
          <a class="btn soft" href="${POSTERS[day.day]}" target="_blank" rel="noopener">🖼️ 開啟一頁圖</a>
        </div>
      </div>
      <div class="section"><h3 class="section-title">⏱️ 今日時間表</h3><div class="timeline">${schedules}</div></div>
      <div class="section"><h3 class="section-title">🧳 食衣住行提醒</h3><div class="tip-grid">${tips}</div></div>
      <div class="section"><h3 class="section-title">📍 推薦景點連結</h3><div class="links-grid">${links}</div></div>
      <div class="section"><div class="note"><span>🔔</span><span>小提醒：${esc(day.note)}</span></div><div class="mobile-poster poster-card"><div class="poster-title"><span>DAY ${day.day} 一頁圖</span></div>${poster}</div></div>
    </section>
    <aside class="poster-card"><div class="poster-title"><span>DAY ${day.day} 一頁圖</span><span>可長按儲存</span></div>${poster}</aside>`;
}
function selectDay(n) { current=n; renderNav(); renderDay(); location.hash = 'day' + n; window.scrollTo({top: document.querySelector('.day-nav-wrap').offsetTop, behavior:'smooth'}); }
function boot() {
  const m = location.hash.match(/day(\d+)/i); if (m) { const n=Number(m[1]); if (DAYS.some(d=>d.day===n)) current=n; }
  renderNav(); renderDay();
}
boot();
</script>
